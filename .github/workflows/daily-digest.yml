name: Daily AI News Digest

on:
  schedule:
    # Fixed UTC schedule.
    # 15:00 UTC is 7:00 AM PST in winter and 8:00 AM PDT in daylight saving time.
    - cron: '0 15 * * *'
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: daily-ai-news-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        pytest tests/ -v

    - name: Set up credentials
      env:
        GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
      run: |
        mkdir -p credentials
        echo "$GMAIL_TOKEN" > credentials/gmail_token.json
        echo "$GMAIL_CREDENTIALS" > credentials/gmail_credentials.json
    
    - name: Run digest
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_SUBSCRIBERS: ${{ secrets.EMAIL_SUBSCRIBERS }}
      run: |
        cd src && python main.py
    
    - name: Commit seen articles tracker
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add seen_articles.json
        git diff --cached --quiet || git commit -m "Update seen articles tracker"
        git push

    - name: Upload archive
      uses: actions/upload-artifact@v4
      with:
        name: daily-archive
        path: archive/
        retention-days: 30
